groups:
  - name: miniidm
    rules:
      - alert: LDAPServerDown
        expr: miniidm_ldap_up == 0
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "Servidor LDAP no disponible"

      - alert: KDCServerDown
        expr: miniidm_kerberos_up == 0
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "Servidor Kerberos no disponible"

      - alert: LDAPReplicationDelay
        expr: miniidm_ldap_replication_lag_seconds > 5
        for: 15s
        labels:
          severity: warning
        annotations:
          summary: "Retraso de replicación LDAP"

      - alert: TLSEndpointDown
        expr: probe_success{job="blackbox-tls"} == 0
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "Endpoint TLS no disponible"
